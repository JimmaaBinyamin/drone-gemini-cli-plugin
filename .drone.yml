kind: pipeline
type: docker
name: build

steps:
  # Build and test Go code
  - name: build
    image: golang:1.22
    commands:
      - go mod download
      - go build -o drone-gemini-cli-plugin .
      - go test -v ./...

---
# ============================================================
# Example 1: Basic Code Review (Inline Prompt + Git Diff)
# ============================================================
kind: pipeline
type: docker
name: basic-review

steps:
  - name: code-review
    image: ghcr.io/jimmaabinyamin/drone-gemini-cli-plugin:v0.1.5
    settings:
      prompt: |
        Review this code for:
        - Security vulnerabilities
        - Potential bugs
        - Code quality issues
        Give a brief summary.
      git_diff: true
      model: gemini-3-flash-preview
      output_format: json
      debug: true
      gcp_project: your-gcp-project-id
      gcp_location: global
      gcp_credentials:
        from_secret: gcp_credentials
    when:
      event: pull_request

trigger:
  event:
    - pull_request

---
# ============================================================
# Example 2: Review with File-Based Prompt (prompt_file)
# Load review guidelines from a markdown file in the repository
# ============================================================
kind: pipeline
type: docker
name: review-with-guidelines

steps:
  - name: review
    image: ghcr.io/jimmaabinyamin/drone-gemini-cli-plugin:v0.1.5
    settings:
      prompt_file: ".review-guidelines.md"
      git_diff: true
      model: gemini-3-flash-preview
      debug: true
      gcp_project: your-gcp-project-id
      gcp_location: global
      gcp_credentials:
        from_secret: gcp_credentials
    when:
      event: pull_request

trigger:
  event:
    - pull_request

---
# ============================================================
# Example 3: Review with Context File (context_file)
# Combine a prompt with additional architecture/context docs
# ============================================================
kind: pipeline
type: docker
name: review-with-context

steps:
  - name: review
    image: ghcr.io/jimmaabinyamin/drone-gemini-cli-plugin:v0.1.5
    settings:
      prompt: "Review this code for compliance with our architecture guidelines"
      context_file: "docs/architecture.md"
      git_diff: true
      model: gemini-3-flash-preview
      debug: true
      gcp_project: your-gcp-project-id
      gcp_location: global
      gcp_credentials:
        from_secret: gcp_credentials
    when:
      event: pull_request

trigger:
  event:
    - pull_request

---
# ============================================================
# Example 4: prompt_file + context_file Combined
# Full-featured review with guidelines and architecture context
# ============================================================
kind: pipeline
type: docker
name: full-review

steps:
  - name: review
    image: ghcr.io/jimmaabinyamin/drone-gemini-cli-plugin:v0.1.5
    settings:
      prompt_file: ".review-guidelines.md"
      context_file: "docs/architecture.md"
      git_diff: true
      model: gemini-3-flash-preview
      debug: true
      gcp_project: your-gcp-project-id
      gcp_location: global
      gcp_credentials:
        from_secret: gcp_credentials
    when:
      event: pull_request

trigger:
  event:
    - pull_request

---
# ============================================================
# Example 5: Commit Summary on Push
# No git_diff - AI analyzes the entire project
# ============================================================
kind: pipeline
type: docker
name: commit-summary

steps:
  - name: summarize
    image: ghcr.io/jimmaabinyamin/drone-gemini-cli-plugin:v0.1.5
    settings:
      prompt: "List all source files in this project and describe what each one does"
      model: gemini-3-flash-preview
      gcp_project: your-gcp-project-id
      gcp_location: global
      gcp_credentials:
        from_secret: gcp_credentials

trigger:
  event:
    - push
  branch:
    - main

---
# ============================================================
# Example 6: Text Output Format
# Simple text output instead of JSON
# ============================================================
kind: pipeline
type: docker
name: quick-summary

steps:
  - name: summary
    image: ghcr.io/jimmaabinyamin/drone-gemini-cli-plugin:v0.1.5
    settings:
      prompt: "Summarize this project in 3 sentences"
      output_format: text
      model: gemini-3-flash-preview
      gcp_project: your-gcp-project-id
      gcp_location: global
      gcp_credentials:
        from_secret: gcp_credentials

trigger:
  event:
    - push

---
# ============================================================
# Example 7: YOLO Mode - AI Auto-Fix
# ⚠️  AI can modify files and execute commands automatically
# ============================================================
kind: pipeline
type: docker
name: auto-fix

steps:
  - name: fix-issues
    image: ghcr.io/jimmaabinyamin/drone-gemini-cli-plugin:v0.1.5
    settings:
      prompt: |
        Fix the SQL injection vulnerabilities by using parameterized queries.
        Fix the XSS vulnerabilities by escaping user input.
        Only modify source files, do not create new files.
        After fixing, show me the diff of your changes.
      yolo: true
      model: gemini-3-flash-preview
      gcp_project: your-gcp-project-id
      gcp_location: global
      gcp_credentials:
        from_secret: gcp_credentials

trigger:
  event:
    - push
  branch:
    - fix/*
